<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Friends coffee and umbrella">
  <defs>
    <linearGradient id="frBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2566"/>
      <stop offset="0.55" stop-color="#2a1a4a"/>
      <stop offset="1" stop-color="#1c1234"/>
    </linearGradient>
    <linearGradient id="frCup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5ce38"/>
      <stop offset="1" stop-color="#e0a92a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#frBg)"/>

  <!-- colourful dots, logo-style string -->
  <g>
    <circle cx="90" cy="70" r="9" fill="#f5ce38"/>
    <circle cx="150" cy="58" r="7" fill="#e2483c"/>
    <circle cx="210" cy="74" r="8" fill="#3f6fd0"/>
    <circle cx="270" cy="58" r="7" fill="#4caf6a"/>
    <circle cx="330" cy="74" r="9" fill="#f5ce38"/>
    <circle cx="392" cy="58" r="7" fill="#e2483c"/>
    <circle cx="690" cy="80" r="9" fill="#3f6fd0"/>
    <circle cx="740" cy="64" r="7" fill="#f5ce38"/>
  </g>

  <!-- umbrella -->
  <g transform="translate(602 250) rotate(14)">
    <path d="M-110 0 A110 110 0 0 1 110 0 Z" fill="#e2483c"/>
    <path d="M-110 0 A110 110 0 0 1 -36 -104 A55 70 0 0 0 -36 0 Z" fill="#f5ce38"/>
    <path d="M36 0 A55 70 0 0 1 36 -104 A110 110 0 0 1 110 0 A55 70 0 0 0 36 0 Z" fill="#3f6fd0"/>
    <rect x="-3" y="0" width="6" height="120" rx="3" fill="#2a1a4a"/>
    <path d="M-3 120 q-3 18 -22 16" fill="none" stroke="#2a1a4a" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- coffee cup and saucer -->
  <g transform="translate(150 300)">
    <ellipse cx="60" cy="150" rx="120" ry="20" fill="#1c1234" opacity="0.5"/>
    <path d="M-6 24 h132 l-14 104 a16 16 0 0 1 -16 14 h-56 a16 16 0 0 1 -16 -14 Z" fill="url(#frCup)"/>
    <ellipse cx="60" cy="24" rx="66" ry="16" fill="#fff2c0"/>
    <ellipse cx="60" cy="24" rx="52" ry="11" fill="#6b3f1e"/>
    <path d="M126 44 a40 40 0 0 1 0 64" fill="none" stroke="url(#frCup)" stroke-width="14" stroke-linecap="round"/>
    <ellipse cx="60" cy="150" rx="96" ry="16" fill="#e0a92a" opacity="0.9"/>
    <g fill="none" stroke="#fff2c0" stroke-width="5" stroke-linecap="round" opacity="0.6">
      <path d="M40 -2 q-10 -16 0 -32"/>
      <path d="M60 -6 q-10 -16 0 -32"/>
      <path d="M80 -2 q-10 -16 0 -32"/>
    </g>
  </g>
</svg>
